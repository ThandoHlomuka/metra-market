<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled | Metra Market</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .cancel-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--dark) 0%, var(--primary-dark) 100%);
            padding: 2rem;
            text-align: center;
        }
        .cancel-container {
            background: rgba(255, 248, 231, 0.05);
            border: 1px solid rgba(255, 248, 231, 0.1);
            border-radius: 20px;
            padding: 3rem;
            max-width: 500px;
            animation: slideIn 0.5s ease-out;
        }
        .cancel-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, #DC143C, #8B0000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            animation: shake 0.5s ease-out;
        }
        .cancel-title {
            font-size: 2rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #DC143C, #8B0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .cancel-message {
            color: var(--gray);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .cancel-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @media (max-width: 480px) {
            .cancel-container {
                padding: 2rem 1.5rem;
            }
            .cancel-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="cancel-page">
        <div class="cancel-container">
            <div class="cancel-icon">
                <i class="fas fa-times"></i>
            </div>
            <h1 class="cancel-title">Payment Cancelled</h1>
            <p class="cancel-message">
                Your payment was not completed. This may happen if you closed the payment window 
                or chose not to continue with the transaction.
            </p>
            
            <div style="background: rgba(255, 165, 0, 0.1); border: 1px solid rgba(255, 165, 0, 0.3); border-radius: 10px; padding: 1rem; margin-bottom: 2rem;">
                <p style="color: #FFA500; margin: 0;">
                    <i class="fas fa-info-circle"></i> 
                    Your cart items are still saved. You can try again whenever you're ready.
                </p>
            </div>

            <div class="cancel-actions">
                <a href="index.html" class="cta-btn">
                    <i class="fas fa-arrow-left"></i> Return to Store
                </a>
                <a href="index.html#products" class="btn-secondary">
                    <i class="fas fa-shopping-cart"></i> View Cart
                </a>
            </div>
        </div>
    </div>

    <script>
        // Log cancelled order if order_id is present
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id');
        
        if (orderId) {
            console.log('Payment cancelled for order:', orderId);
            // Optionally update order status in localStorage
            const orders = JSON.parse(localStorage.getItem('metraOrders') || '[]');
            const order = orders.find(o => o.id === orderId);
            if (order) {
                order.paymentStatus = 'cancelled';
                order.status = 'cancelled';
                localStorage.setItem('metraOrders', JSON.stringify(orders));
            }
        }
    </script>
</body>
</html>
