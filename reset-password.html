<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Metra Market</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .reset-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--dark) 0%, var(--primary-dark) 100%);
            padding: 2rem;
        }
        .reset-container {
            background: rgba(255, 248, 231, 0.05);
            border: 1px solid rgba(255, 248, 231, 0.1);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .reset-icon {
            font-size: 4rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
        }
        .reset-container h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .reset-container p {
            color: var(--gray);
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            color: var(--light);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 248, 231, 0.05);
            border: 1px solid rgba(255, 248, 231, 0.1);
            border-radius: 10px;
            color: var(--light);
            font-family: inherit;
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            background: rgba(255,248,231,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
        }
        .password-strength-bar.weak { width: 33%; background: #DC143C; }
        .password-strength-bar.medium { width: 66%; background: #FFA500; }
        .password-strength-bar.strong { width: 100%; background: #228B22; }
        .cta-btn {
            width: 100%;
            background: var(--gradient);
            border: none;
            color: white;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .cta-btn:hover {
            transform: translateY(-2px);
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray);
            text-decoration: none;
            margin-top: 1.5rem;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: var(--primary);
        }
        .error-message {
            color: var(--danger);
            margin-top: 1rem;
            font-size: 0.9rem;
        }
        .success-message {
            color: #228B22;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="reset-page">
        <div class="reset-container">
            <div class="reset-icon">
                <i class="fas fa-lock"></i>
            </div>
            <h1>Reset Your Password</h1>
            <p>Enter your new password below</p>
            
            <div id="resetForm">
                <form onsubmit="handleResetSubmit(event)">
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> New Password</label>
                        <input type="password" id="newPassword" placeholder="Enter new password" required minlength="6" onkeyup="checkPasswordStrength()">
                        <div class="password-strength">
                            <div class="password-strength-bar" id="strengthBar"></div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                    </div>
                    
                    <button type="submit" class="cta-btn">
                        <i class="fas fa-check"></i> Reset Password
                    </button>
                    
                    <p class="error-message" id="errorMessage"></p>
                    <p class="success-message" id="successMessage"></p>
                </form>
            </div>
            
            <div id="successScreen" style="display: none;">
                <div style="font-size: 4rem; color: #228B22; margin-bottom: 1rem;">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h2 style="margin-bottom: 0.5rem;">Password Reset Successful!</h2>
                <p style="margin-bottom: 2rem;">Your password has been updated. You can now login with your new password.</p>
                <a href="index.html" class="cta-btn" style="display: inline-block; text-decoration: none;">
                    <i class="fas fa-sign-in-alt"></i> Go to Login
                </a>
            </div>
            
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Store
            </a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            document.getElementById('errorMessage').textContent = 'Invalid or missing reset token';
            document.querySelector('form').style.display = 'none';
        }
        
        function checkPasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const bar = document.getElementById('strengthBar');
            
            if (password.length === 0) {
                bar.className = 'password-strength-bar';
                return;
            }
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            bar.className = 'password-strength-bar';
            if (strength <= 1) bar.classList.add('weak');
            else if (strength <= 2) bar.classList.add('medium');
            else bar.classList.add('strong');
        }
        
        function handleResetSubmit(event) {
            event.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorEl = document.getElementById('errorMessage');
            const successEl = document.getElementById('successMessage');
            
            // Validate passwords match
            if (newPassword !== confirmPassword) {
                errorEl.textContent = 'Passwords do not match';
                successEl.textContent = '';
                return;
            }
            
            // Validate password strength
            if (newPassword.length < 6) {
                errorEl.textContent = 'Password must be at least 6 characters';
                successEl.textContent = '';
                return;
            }
            
            // Reset password
            const result = handleResetPassword(token, newPassword);
            
            if (result.success) {
                document.getElementById('resetForm').style.display = 'none';
                document.getElementById('successScreen').style.display = 'block';
            } else {
                errorEl.textContent = result.message;
            }
        }
    </script>
</body>
</html>
