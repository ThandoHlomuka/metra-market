<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Metra Market</title>
    <link rel="stylesheet" href="styles.css?v=2.0.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        .checkout-page {
            min-height: 100vh;
            padding: 6rem 2rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .checkout-page h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        .checkout-container {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 2rem;
        }
        .order-summary {
            background: rgba(255, 248, 231, 0.05);
            border: 1px solid rgba(255, 248, 231, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
        }
        .checkout-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin-bottom: 0.75rem;
        }
        .checkout-item-icon {
            font-size: 2rem;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #8B0000, #DC143C);
            border-radius: 8px;
        }
        .checkout-item-details h4 {
            color: var(--light);
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
        }
        .checkout-item-details p {
            color: var(--gray);
            font-size: 0.85rem;
        }
        .checkout-item-price {
            margin-left: auto;
            color: var(--primary);
            font-weight: 700;
        }
        .checkout-totals {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 248, 231, 0.1);
        }
        .checkout-total-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            color: var(--gray);
        }
        .checkout-total-row.final-total {
            color: var(--light);
            font-size: 1.25rem;
            font-weight: 700;
            border-top: 2px solid var(--primary);
            padding-top: 0.75rem;
            margin-top: 0.5rem;
        }
        .checkout-form {
            background: rgba(255, 248, 231, 0.03);
            border: 1px solid rgba(255, 248, 231, 0.1);
            border-radius: 12px;
            padding: 2rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            color: var(--light);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 248, 231, 0.2);
            border-radius: 8px;
            color: var(--light);
            font-size: 0.9rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .payment-options, .delivery-options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin: 1rem 0;
        }
        .payment-option, .delivery-option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(255, 248, 231, 0.05);
            border-radius: 8px;
            cursor: pointer;
        }
        .payment-option input, .delivery-option input {
            width: auto;
        }
        .checkout-submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #8B0000, #DC143C);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .checkout-submit-btn:hover {
            transform: translateY(-2px);
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray);
            font-size: 0.9rem;
        }
        .checkbox-label a {
            color: var(--primary);
        }
        @media (max-width: 768px) {
            .checkout-container {
                grid-template-columns: 1fr;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <script>document.documentElement.classList.add('loaded');</script>

    <!-- Header -->
    <header class="header">
        <nav class="navbar">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 0.5rem;">
                    <i class="fas fa-shopping-bag"></i>
                    <span>Metra Market</span>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shopping.html">Products</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
            <div class="nav-icons">
                <div class="cart-icon" onclick="window.location.href='shopping.html'">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </div>
            </div>
        </nav>
    </header>

    <div class="checkout-page">
        <h1><i class="fas fa-lock"></i> Secure Checkout</h1>

        <div class="checkout-container">
            <!-- Order Summary -->
            <div class="order-summary">
                <h3 style="color: var(--light); margin-bottom: 1rem;"><i class="fas fa-receipt"></i> Order Summary</h3>
                <div id="checkoutItemsList"></div>
                <div class="checkout-totals">
                    <div class="checkout-total-row">
                        <span>Subtotal:</span>
                        <span id="checkoutSubtotal">R0.00</span>
                    </div>
                    <div class="checkout-total-row">
                        <span>Shipping:</span>
                        <span id="checkoutShipping">R0.00</span>
                    </div>
                    <div class="checkout-total-row final-total">
                        <span>Total:</span>
                        <span id="checkoutTotal">R0.00</span>
                    </div>
                </div>
            </div>

            <!-- Checkout Form -->
            <div class="checkout-form">
                <h3 style="color: var(--light); margin-bottom: 1rem;"><i class="fas fa-user"></i> Your Details</h3>
                <form id="checkoutForm" onsubmit="processCheckout(event)">
                    <div class="form-group">
                        <label for="checkoutName">Full Name *</label>
                        <input type="text" id="checkoutName" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="checkoutEmail">Email Address *</label>
                        <input type="email" id="checkoutEmail" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label for="checkoutPhone">Phone Number *</label>
                        <input type="tel" id="checkoutPhone" required placeholder="+27 12 345 6789">
                    </div>

                    <h3 style="color: var(--light); margin: 1.5rem 0 1rem;"><i class="fas fa-map-marker-alt"></i> Delivery Address</h3>
                    <div class="form-group">
                        <label for="checkoutAddress">Street Address *</label>
                        <input type="text" id="checkoutAddress" required placeholder="123 Main Street">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="checkoutCity">City *</label>
                            <input type="text" id="checkoutCity" required placeholder="Johannesburg">
                        </div>
                        <div class="form-group">
                            <label for="checkoutPostalCode">Postal Code *</label>
                            <input type="text" id="checkoutPostalCode" required placeholder="2001" maxlength="4">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="checkoutProvince">Province *</label>
                        <select id="checkoutProvince" required>
                            <option value="">Select Province</option>
                            <option value="Gauteng">Gauteng</option>
                            <option value="Western Cape">Western Cape</option>
                            <option value="KwaZulu-Natal">KwaZulu-Natal</option>
                            <option value="Eastern Cape">Eastern Cape</option>
                            <option value="Free State">Free State</option>
                            <option value="Limpopo">Limpopo</option>
                            <option value="Mpumalanga">Mpumalanga</option>
                            <option value="North West">North West</option>
                            <option value="Northern Cape">Northern Cape</option>
                        </select>
                    </div>

                    <h3 style="color: var(--light); margin: 1.5rem 0 1rem;"><i class="fas fa-credit-card"></i> Payment Method</h3>
                    <div class="payment-options">
                        <label class="payment-option">
                            <input type="radio" name="checkoutPayment" value="payfast" checked>
                            <span><i class="fas fa-lock"></i> PayFast (Credit/Debit Card)</span>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="checkoutPayment" value="bank_transfer">
                            <span><i class="fas fa-university"></i> Bank Transfer (EFT)</span>
                        </label>
                    </div>

                    <h3 style="color: var(--light); margin: 1.5rem 0 1rem;"><i class="fas fa-truck"></i> Delivery Method</h3>
                    <div class="delivery-options">
                        <label class="delivery-option">
                            <input type="radio" name="checkoutDelivery" value="delivery" checked>
                            <span><i class="fas fa-truck"></i> Home Delivery</span>
                        </label>
                        <label class="delivery-option">
                            <input type="radio" name="checkoutDelivery" value="collection">
                            <span><i class="fas fa-store"></i> Store Collection (Free)</span>
                        </label>
                    </div>

                    <div class="form-group" style="margin-top: 1.5rem;">
                        <label class="checkbox-label">
                            <input type="checkbox" id="checkoutTerms" required>
                            <span>I agree to the <a href="terms.html" target="_blank">Terms & Conditions</a> and <a href="privacy.html" target="_blank">Privacy Policy</a> *</span>
                        </label>
                    </div>

                    <button type="submit" class="checkout-submit-btn">
                        <i class="fas fa-lock"></i> Complete Order & Pay
                    </button>

                    <p style="text-align: center; color: var(--gray); font-size: 0.85rem; margin-top: 1rem;">
                        <i class="fas fa-shield-alt" style="color: #228B22;"></i> Your information is secure and encrypted
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js?v=2.0.0"></script>
    <script>
        // Load cart and display items
        document.addEventListener('DOMContentLoaded', function() {
            const saved = localStorage.getItem('metraCart');
            const cart = saved ? JSON.parse(saved) : [];

            if (cart.length === 0) {
                window.location.href = 'shopping.html';
                return;
            }

            // Display cart items
            const container = document.getElementById('checkoutItemsList');
            container.innerHTML = cart.map(item => `
                <div class="checkout-item">
                    <div class="checkout-item-icon">${item.icon}</div>
                    <div class="checkout-item-details">
                        <h4>${item.name}</h4>
                        <p>Qty: ${item.quantity}</p>
                    </div>
                    <div class="checkout-item-price">R${(item.price * item.quantity).toFixed(2)}</div>
                </div>
            `).join('');

            // Calculate totals
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const shipping = 0; // Will be calculated
            const total = subtotal + shipping;

            document.getElementById('checkoutSubtotal').textContent = 'R' + subtotal.toFixed(2);
            document.getElementById('checkoutShipping').textContent = 'Calculated at next step';
            document.getElementById('checkoutTotal').textContent = 'R' + total.toFixed(2);

            // Update cart count
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = totalItems;

            // Pre-fill if user is logged in
            const currentUser = JSON.parse(localStorage.getItem('metraCurrentUser') || 'null');
            if (currentUser) {
                document.getElementById('checkoutName').value = currentUser.name || '';
                document.getElementById('checkoutEmail').value = currentUser.email || '';
                document.getElementById('checkoutPhone').value = currentUser.phone || '';
            }
        });

        // Process checkout
        function processCheckout(event) {
            event.preventDefault();

            const name = document.getElementById('checkoutName').value.trim();
            const email = document.getElementById('checkoutEmail').value.trim().toLowerCase();
            const phone = document.getElementById('checkoutPhone').value.trim();
            const address = document.getElementById('checkoutAddress').value.trim();
            const city = document.getElementById('checkoutCity').value.trim();
            const postalCode = document.getElementById('checkoutPostalCode').value.trim();
            const province = document.getElementById('checkoutProvince').value;
            const paymentMethod = document.querySelector('input[name="checkoutPayment"]:checked').value;
            const deliveryMethod = document.querySelector('input[name="checkoutDelivery"]:checked').value;
            const termsAccepted = document.getElementById('checkoutTerms').checked;

            if (!termsAccepted) {
                alert('Please accept the Terms & Conditions to continue');
                return;
            }

            const saved = localStorage.getItem('metraCart');
            const cart = saved ? JSON.parse(saved) : [];

            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const shipping = deliveryMethod === 'collection' ? 0 : 150;
            const total = subtotal + shipping;

            const order = {
                id: 'ORD-' + Date.now(),
                invoiceNumber: 'INV-' + Date.now(),
                customerName: name,
                customerEmail: email,
                customerPhone: phone,
                shippingAddress: { street: address, city: city, postalCode: postalCode, province: province, country: 'South Africa' },
                deliveryMethod: deliveryMethod,
                items: cart,
                subtotal: subtotal,
                shipping: shipping,
                total: total,
                paymentMethod: paymentMethod,
                status: 'pending_payment',
                date: new Date().toLocaleDateString('en-ZA'),
                createdAt: new Date().toISOString()
            };

            // Save order
            const orders = JSON.parse(localStorage.getItem('metraOrders') || '[]');
            orders.push(order);
            localStorage.setItem('metraOrders', JSON.stringify(orders));

            // Handle PayFast payment
            if (paymentMethod === 'payfast') {
                redirectToPayFast(order);
            } else {
                // Bank transfer - show success
                localStorage.removeItem('metraCart');
                window.location.href = 'success.html?order_id=' + encodeURIComponent(order.id);
            }
        }

        // Redirect to PayFast
        function redirectToPayFast(order) {
            const payFastUrl = 'https://www.payfast.co.za/eng/process';

            const formData = {
                merchant_id: '13343379',
                merchant_key: '8jgcm78j7sqph',
                amount: order.total.toFixed(2),
                item_name: 'Order ' + order.id,
                item_description: 'Purchase from Metra Market',
                return_url: window.location.origin + '/success.html?order_id=' + encodeURIComponent(order.id),
                cancel_url: window.location.origin + '/cancel.html?order_id=' + encodeURIComponent(order.id),
                notify_url: window.location.origin + '/ipn.php',
                email_address: order.customerEmail,
                name_first: order.customerName.split(' ')[0] || 'Customer',
                name_last: order.customerName.split(' ').slice(1).join(' ') || ''
            };

            // Create and submit form
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = payFastUrl;
            form.style.display = 'none';

            Object.keys(formData).forEach(key => {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = formData[key];
                form.appendChild(input);
            });

            document.body.appendChild(form);
            form.submit();
        }
    </script>
</body>
</html>
