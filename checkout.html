<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Metra Market</title>
    <link rel="stylesheet" href="styles.css?v=3.0.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        .checkout-page {
            min-height: 100vh;
            padding: 6rem 2rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .checkout-page h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        .checkout-container {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 2rem;
        }
        .order-summary {
            background: rgba(255, 248, 231, 0.05);
            border: 1px solid rgba(255, 248, 231, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
        }
        .checkout-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin-bottom: 0.75rem;
        }
        .checkout-item-icon {
            font-size: 2rem;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #8B0000, #DC143C);
            border-radius: 8px;
        }
        .checkout-item-details h4 {
            color: var(--light);
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
        }
        .checkout-item-details p {
            color: var(--gray);
            font-size: 0.85rem;
        }
        .checkout-item-price {
            margin-left: auto;
            color: var(--primary);
            font-weight: 700;
        }
        .checkout-totals {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 248, 231, 0.1);
        }
        .checkout-total-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            color: var(--gray);
        }
        .checkout-total-row.final-total {
            color: var(--light);
            font-size: 1.25rem;
            font-weight: 700;
            border-top: 2px solid var(--primary);
            padding-top: 0.75rem;
            margin-top: 0.5rem;
        }
        .checkout-form {
            background: rgba(255, 248, 231, 0.03);
            border: 1px solid rgba(255, 248, 231, 0.1);
            border-radius: 12px;
            padding: 2rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            color: var(--light);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 248, 231, 0.2);
            border-radius: 8px;
            color: var(--light);
            font-size: 0.9rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .payment-options, .delivery-options, .shipping-options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin: 1rem 0;
        }
        .payment-option, .delivery-option, .shipping-option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(255, 248, 231, 0.05);
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.3s;
        }
        .shipping-option.selected {
            border-color: var(--primary);
            background: rgba(139, 0, 0, 0.1);
        }
        .payment-option input, .delivery-option input, .shipping-option input {
            width: auto;
            accent-color: #00C853;
        }
        .shipping-option-info {
            flex: 1;
        }
        .shipping-option-name {
            color: var(--light);
            font-weight: 600;
            font-size: 0.95rem;
        }
        .shipping-option-time {
            color: var(--gray);
            font-size: 0.8rem;
        }
        .shipping-option-price {
            color: #00C853;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .checkout-submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #8B0000, #DC143C);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .checkout-submit-btn:hover {
            transform: translateY(-2px);
        }
        .checkout-submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray);
            font-size: 0.9rem;
        }
        .checkbox-label a {
            color: var(--primary);
        }
        .shipping-loading {
            text-align: center;
            color: var(--gray);
            padding: 1rem;
        }
        .shipping-loading i {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .shipping-error {
            background: rgba(220, 20, 60, 0.1);
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 8px;
            padding: 1rem;
            color: #ff6b6b;
            text-align: center;
        }
        @media (max-width: 768px) {
            .checkout-container {
                grid-template-columns: 1fr;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <script>document.documentElement.classList.add('loaded');</script>

    <!-- Header -->
    <header class="header">
        <nav class="navbar">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 0.5rem;">
                    <i class="fas fa-shopping-bag"></i>
                    <span>Metra Market</span>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shopping.html">Products</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
            <div class="nav-icons">
                <div class="cart-icon" onclick="window.location.href='shopping.html'">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </div>
            </div>
        </nav>
    </header>

    <div class="checkout-page">
        <h1><i class="fas fa-lock"></i> Secure Checkout</h1>

        <div class="checkout-container">
            <!-- Order Summary -->
            <div class="order-summary">
                <h3 style="color: var(--light); margin-bottom: 1rem;"><i class="fas fa-receipt"></i> Order Summary</h3>
                <div id="checkoutItemsList"></div>
                <div class="checkout-totals">
                    <div class="checkout-total-row">
                        <span>Subtotal:</span>
                        <span id="checkoutSubtotal">R0.00</span>
                    </div>
                    <div class="checkout-total-row">
                        <span>Shipping:</span>
                        <span id="checkoutShipping">Select shipping below</span>
                    </div>
                    <div class="checkout-total-row final-total">
                        <span>Total:</span>
                        <span id="checkoutTotal">R0.00</span>
                    </div>
                </div>
            </div>

            <!-- Checkout Form -->
            <div class="checkout-form">
                <h3 style="color: var(--light); margin-bottom: 1rem;"><i class="fas fa-user"></i> Your Details</h3>
                <form id="checkoutForm" onsubmit="processCheckout(event)">
                    <div class="form-group">
                        <label for="checkoutName">Full Name *</label>
                        <input type="text" id="checkoutName" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="checkoutEmail">Email Address *</label>
                        <input type="email" id="checkoutEmail" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label for="checkoutPhone">Phone Number *</label>
                        <input type="tel" id="checkoutPhone" required placeholder="+27 12 345 6789">
                    </div>

                    <h3 style="color: var(--light); margin: 1.5rem 0 1rem;"><i class="fas fa-map-marker-alt"></i> Delivery Address</h3>
                    <div class="form-group">
                        <label for="checkoutAddress">Street Address *</label>
                        <input type="text" id="checkoutAddress" required placeholder="123 Main Street">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="checkoutCity">City *</label>
                            <input type="text" id="checkoutCity" required placeholder="Johannesburg">
                        </div>
                        <div class="form-group">
                            <label for="checkoutPostalCode">Postal Code *</label>
                            <input type="text" id="checkoutPostalCode" required placeholder="2001" maxlength="4">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="checkoutProvince">Province *</label>
                        <select id="checkoutProvince" required onchange="calculateShipping()">
                            <option value="">Select Province</option>
                            <option value="Gauteng">Gauteng</option>
                            <option value="Western Cape">Western Cape</option>
                            <option value="KwaZulu-Natal">KwaZulu-Natal</option>
                            <option value="Eastern Cape">Eastern Cape</option>
                            <option value="Free State">Free State</option>
                            <option value="Limpopo">Limpopo</option>
                            <option value="Mpumalanga">Mpumalanga</option>
                            <option value="North West">North West</option>
                            <option value="Northern Cape">Northern Cape</option>
                        </select>
                    </div>

                    <h3 style="color: var(--light); margin: 1.5rem 0 1rem;"><i class="fas fa-truck"></i> Shipping Options</h3>
                    <div id="shippingOptionsContainer">
                        <div class="shipping-loading">
                            <i class="fas fa-spinner"></i> Calculating shipping rates...
                        </div>
                    </div>

                    <h3 style="color: var(--light); margin: 1.5rem 0 1rem;"><i class="fas fa-credit-card"></i> Payment Method</h3>
                    <div class="payment-options">
                        <label class="payment-option">
                            <input type="radio" name="checkoutPayment" value="payfast" checked>
                            <span><i class="fas fa-lock"></i> PayFast (Credit/Debit Card)</span>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="checkoutPayment" value="bank_transfer">
                            <span><i class="fas fa-university"></i> Bank Transfer (EFT)</span>
                        </label>
                    </div>

                    <div class="form-group" style="margin-top: 1.5rem;">
                        <label class="checkbox-label">
                            <input type="checkbox" id="checkoutTerms" required>
                            <span>I agree to the <a href="terms.html" target="_blank">Terms & Conditions</a> and <a href="privacy.html" target="_blank">Privacy Policy</a> *</span>
                        </label>
                    </div>

                    <button type="submit" class="checkout-submit-btn" id="checkoutSubmitBtn">
                        <i class="fas fa-lock"></i> Complete Order & Pay
                    </button>

                    <p style="text-align: center; color: var(--gray); font-size: 0.85rem; margin-top: 1rem;">
                        <i class="fas fa-shield-alt" style="color: #228B22;"></i> Your information is secure and encrypted
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js?v=3.0.0"></script>
    <script>
        // Global variables
        let selectedShippingOption = null;
        let selectedShippingCost = 0;
        let cart = [];

        // Load cart and display items
        document.addEventListener('DOMContentLoaded', function() {
            const saved = localStorage.getItem('metraCart');
            cart = saved ? JSON.parse(saved) : [];

            if (cart.length === 0) {
                window.location.href = 'shopping.html';
                return;
            }

            // Display cart items
            const container = document.getElementById('checkoutItemsList');
            container.innerHTML = cart.map(item => `
                <div class="checkout-item">
                    <div class="checkout-item-icon">${item.icon}</div>
                    <div class="checkout-item-details">
                        <h4>${item.name}</h4>
                        <p>Qty: ${item.quantity}</p>
                    </div>
                    <div class="checkout-item-price">R${(item.price * item.quantity).toFixed(2)}</div>
                </div>
            `).join('');

            // Calculate subtotal
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('checkoutSubtotal').textContent = 'R' + subtotal.toFixed(2);
            document.getElementById('checkoutTotal').textContent = 'R' + subtotal.toFixed(2);

            // Update cart count
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = totalItems;

            // Pre-fill if user is logged in
            const currentUser = JSON.parse(localStorage.getItem('metraCurrentUser') || 'null');
            if (currentUser) {
                const nameEl = document.getElementById('checkoutName');
                const emailEl = document.getElementById('checkoutEmail');
                const phoneEl = document.getElementById('checkoutPhone');
                if (nameEl) nameEl.value = currentUser.name || '';
                if (emailEl) emailEl.value = currentUser.email || '';
                if (phoneEl) phoneEl.value = currentUser.phone || '';
            }

            // Calculate shipping after a short delay
            setTimeout(calculateShipping, 500);
        });

        // Calculate shipping based on cart items and destination
        function calculateShipping() {
            const province = document.getElementById('checkoutProvince').value;
            const container = document.getElementById('shippingOptionsContainer');

            if (!province) {
                container.innerHTML = '<p style="color: var(--gray); text-align: center;">Please select a province to see shipping options</p>';
                return;
            }

            // Show loading
            container.innerHTML = '<div class="shipping-loading"><i class="fas fa-spinner"></i> Calculating shipping rates...</div>';

            // Calculate total weight and dimensions from cart
            let totalWeight = 0;
            let maxLength = 0;
            let maxWidth = 0;
            let totalHeight = 0;

            cart.forEach(item => {
                const product = products.find(p => p.id === item.id);
                if (product) {
                    totalWeight += (product.weight || 0.5) * item.quantity;
                    maxLength = Math.max(maxLength, product.length || 30);
                    maxWidth = Math.max(maxWidth, product.width || 20);
                    totalHeight += (product.height || 15) * item.quantity;
                }
            });

            // Use defaults if no data
            if (totalWeight === 0) {
                totalWeight = 0.5;
                maxLength = 30;
                maxWidth = 20;
                totalHeight = 15;
            }

            console.log('Shipping calculation:', {
                province,
                weight: totalWeight,
                dimensions: `${maxLength}x${maxWidth}x${totalHeight}cm`
            });

            // Try Bobgo API first
            fetchBobgoRates(province, totalWeight, maxLength, maxWidth, totalHeight)
                .then(options => {
                    if (options && options.length > 0) {
                        displayShippingOptions(options);
                    } else {
                        // Fallback to flat rates
                        displayFallbackRates(province);
                    }
                })
                .catch(error => {
                    console.error('Bobgo API failed:', error);
                    displayFallbackRates(province);
                });
        }

        // Fetch Bobgo shipping rates
        async function fetchBobgoRates(province, weight, length, width, height) {
            const BOBGO_API_KEY = '5a830068eeb9431da5bf1577a9980d99';
            const BOBGO_API_URL = 'https://api.bobgo.co.za/v1';

            try {
                const response = await fetch(`${BOBGO_API_URL}/couriers`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${BOBGO_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        origin: 'Johannesburg',
                        destination: province,
                        parcels: [{
                            weight: Math.round(weight * 1000) / 1000, // kg with 3 decimals
                            length: Math.round(length),
                            width: Math.round(width),
                            height: Math.round(height)
                        }],
                        currency: 'ZAR',
                        live_rates: true
                    })
                });

                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }

                const data = await response.json();
                console.log('Bobgo response:', data);

                if (data.couriers && data.couriers.length > 0) {
                    return data.couriers.map((courier, index) => ({
                        id: 'bobgo_' + index,
                        name: courier.name || courier.courier_name || 'Standard Courier',
                        time: courier.delivery_time || courier.estimated_days ? `${courier.estimated_days || '2-5'} business days` : '2-5 business days',
                        price: parseFloat(courier.price) || 0,
                        service: courier.service_type || 'Standard'
                    }));
                }

                return [];
            } catch (error) {
                console.error('Bobgo API error:', error);
                return [];
            }
        }

        // Display fallback shipping rates
        function displayFallbackRates(province) {
            const isLocal = province === 'Gauteng';
            const baseRate = isLocal ? 99 : 149;
            const expressRate = isLocal ? 149 : 249;

            const options = [
                {
                    id: 'standard',
                    name: 'Standard Delivery',
                    time: '3-5 business days',
                    price: baseRate,
                    service: 'Standard'
                },
                {
                    id: 'express',
                    name: 'Express Delivery',
                    time: '1-2 business days',
                    price: expressRate,
                    service: 'Express'
                }
            ];

            displayShippingOptions(options);
        }

        // Display shipping options
        function displayShippingOptions(options) {
            const container = document.getElementById('shippingOptionsContainer');

            container.innerHTML = options.map((option, index) => `
                <label class="shipping-option ${index === 0 ? 'selected' : ''}" onclick="selectShipping('${option.id}', ${option.price}, this)">
                    <input type="radio" name="shippingOption" value="${option.id}" ${index === 0 ? 'checked' : ''}>
                    <div class="shipping-option-info">
                        <div class="shipping-option-name">${option.name}</div>
                        <div class="shipping-option-time">${option.time}</div>
                    </div>
                    <div class="shipping-option-price">R${option.price.toFixed(2)}</div>
                </label>
            `).join('');

            // Auto-select first option
            if (options.length > 0) {
                selectShipping(options[0].id, options[0].price, container.querySelector('.shipping-option'));
            }
        }

        // Select shipping option
        function selectShipping(id, price, element) {
            selectedShippingOption = id;
            selectedShippingCost = price;

            // Update UI
            document.querySelectorAll('.shipping-option').forEach(el => el.classList.remove('selected'));
            if (element) element.classList.add('selected');

            // Update totals
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const total = subtotal + price;

            document.getElementById('checkoutShipping').textContent = 'R' + price.toFixed(2);
            document.getElementById('checkoutTotal').textContent = 'R' + total.toFixed(2);

            console.log('Shipping selected:', { id, price, total });
        }

        // Process checkout
        function processCheckout(event) {
            event.preventDefault();

            const name = document.getElementById('checkoutName').value.trim();
            const email = document.getElementById('checkoutEmail').value.trim().toLowerCase();
            const phone = document.getElementById('checkoutPhone').value.trim();
            const address = document.getElementById('checkoutAddress').value.trim();
            const city = document.getElementById('checkoutCity').value.trim();
            const postalCode = document.getElementById('checkoutPostalCode').value.trim();
            const province = document.getElementById('checkoutProvince').value;
            const paymentMethod = document.querySelector('input[name="checkoutPayment"]:checked').value;
            const termsAccepted = document.getElementById('checkoutTerms').checked;

            if (!termsAccepted) {
                alert('Please accept the Terms & Conditions to continue');
                return;
            }

            if (!selectedShippingOption) {
                alert('Please select a shipping option');
                return;
            }

            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const total = subtotal + selectedShippingCost;

            const order = {
                id: 'ORD-' + Date.now(),
                invoiceNumber: 'INV-' + Date.now(),
                customerName: name,
                customerEmail: email,
                customerPhone: phone,
                shippingAddress: { street: address, city: city, postalCode: postalCode, province: province, country: 'South Africa' },
                shippingMethod: selectedShippingOption,
                shippingCost: selectedShippingCost,
                items: cart,
                subtotal: subtotal,
                total: total,
                paymentMethod: paymentMethod,
                status: 'pending_payment',
                date: new Date().toLocaleDateString('en-ZA'),
                createdAt: new Date().toISOString()
            };

            // Save order
            const orders = JSON.parse(localStorage.getItem('metraOrders') || '[]');
            orders.push(order);
            localStorage.setItem('metraOrders', JSON.stringify(orders));

            // Handle payment
            if (paymentMethod === 'payfast') {
                redirectToPayFast(order);
            } else {
                localStorage.removeItem('metraCart');
                window.location.href = 'success.html?order_id=' + encodeURIComponent(order.id);
            }
        }

        // Redirect to PayFast
        function redirectToPayFast(order) {
            const payFastUrl = 'https://www.payfast.co.za/eng/process';

            const formData = {
                merchant_id: '13343379',
                merchant_key: '8jgcm78j7sqph',
                amount: order.total.toFixed(2),
                item_name: 'Order ' + order.id,
                item_description: 'Purchase from Metra Market',
                return_url: window.location.origin + '/success.html?order_id=' + encodeURIComponent(order.id),
                cancel_url: window.location.origin + '/cancel.html?order_id=' + encodeURIComponent(order.id),
                notify_url: window.location.origin + '/ipn.php',
                email_address: order.customerEmail,
                name_first: order.customerName.split(' ')[0] || 'Customer',
                name_last: order.customerName.split(' ').slice(1).join(' ') || ''
            };

            const form = document.createElement('form');
            form.method = 'POST';
            form.action = payFastUrl;
            form.style.display = 'none';

            Object.keys(formData).forEach(key => {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = formData[key];
                form.appendChild(input);
            });

            document.body.appendChild(form);
            form.submit();
        }
    </script>
</body>
</html>
