<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Metra Market</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="author" content="Metra Market">
    <meta name="robots" content="index, follow">
    <meta name="keywords" content="online shopping, South Africa, premium products, free shipping, PayFast">
    <meta name="language" content="English">
    <meta name="theme-color" content="#8B0000">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.metramarket.co.za/checkout.html">
    <meta property="og:title" content="Checkout | Metra Market">
    <meta property="og:description" content="Secure checkout with PayFast payment">
    <meta property="og:image" content="https://www.metramarket.co.za/og-image.jpg">
    <meta property="og:site_name" content="Metra Market">
    <meta property="og:locale" content="en_ZA">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://www.metramarket.co.za/checkout.html">
    <meta property="twitter:title" content="Checkout | Metra Market">
    <meta property="twitter:description" content="Secure checkout with PayFast payment">
    <meta property="twitter:image" content="https://www.metramarket.co.za/twitter-image.jpg">
    <link rel="stylesheet" href="styles.css?v=7.0.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="address-locator.js?v=1.0.0"></script>
    <script src="tracking.js?v=1.0.0"></script>
    <script src="bobgo-sync-queue.js?v=1.0.0"></script>
    <script src="script.js?v=7.0.0"></script>
    <style>
        .checkout-page { min-height: 100vh; padding: 6rem 2rem 2rem; max-width: 1200px; margin: 0 auto; }
        .checkout-page h1 { font-size: 2rem; margin-bottom: 2rem; text-align: center; }
        .checkout-container { display: grid; grid-template-columns: 1fr 1.2fr; gap: 2rem; }
        .order-summary { background: rgba(255, 248, 231, 0.05); border: 1px solid rgba(255, 248, 231, 0.1); border-radius: 12px; padding: 1.5rem; }
        .checkout-item { display: flex; align-items: center; gap: 1rem; padding: 0.75rem; background: rgba(0, 0, 0, 0.2); border-radius: 8px; margin-bottom: 0.75rem; }
        .checkout-item-icon { font-size: 2rem; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #8B0000, #DC143C); border-radius: 8px; }
        .checkout-item-details h4 { color: var(--light); font-size: 0.95rem; margin-bottom: 0.25rem; }
        .checkout-item-details p { color: var(--gray); font-size: 0.85rem; }
        .checkout-item-price { margin-left: auto; color: #DC143C; font-weight: 700; }
        .checkout-totals { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(255, 248, 231, 0.1); }
        .checkout-total-row { display: flex; justify-content: space-between; padding: 0.5rem 0; color: var(--gray); }
        .checkout-total-row.final-total { color: var(--light); font-size: 1.25rem; font-weight: 700; border-top: 2px solid #DC143C; padding-top: 0.75rem; margin-top: 0.5rem; }
        .checkout-form { background: rgba(255, 248, 231, 0.03); border: 1px solid rgba(255, 248, 231, 0.1); border-radius: 12px; padding: 2rem; }
        .form-group { margin-bottom: 1rem; position: relative; }
        .form-group label { display: block; color: var(--light); margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 0.75rem; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 248, 231, 0.2); border-radius: 8px; color: var(--light); font-size: 0.9rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .shipping-option, .payment-option { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; background: rgba(255, 248, 231, 0.05); border-radius: 8px; cursor: pointer; border: 1px solid transparent; transition: all 0.3s; margin-bottom: 0.5rem; }
        .shipping-option.selected { border-color: #DC143C; background: rgba(220, 20, 60, 0.1); }
        .shipping-option input, .payment-option input { width: auto; accent-color: #00C853; }
        .shipping-option-info { flex: 1; }
        .shipping-option-name { color: var(--light); font-weight: 600; font-size: 0.95rem; }
        .shipping-option-service { color: var(--gray); font-size: 0.8rem; margin-top: 0.2rem; font-style: italic; }
        .shipping-option-time { color: var(--gray); font-size: 0.8rem; margin-top: 0.25rem; }
        .shipping-option-price { color: #00C853; font-weight: 700; font-size: 1.1rem; text-align: right; }
        .checkout-submit-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, #8B0000, #DC143C); border: none; border-radius: 12px; color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 1.5rem; transition: all 0.3s; }
        .checkout-submit-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(220, 20, 60, 0.4); }
        .checkout-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .spinner { text-align: center; color: var(--gray); padding: 3rem; }
        .spinner i { animation: spin 1s linear infinite; font-size: 2rem; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .empty-cart { text-align: center; padding: 4rem 2rem; color: var(--gray); }
        .empty-cart i { font-size: 4rem; margin-bottom: 1rem; color: var(--primary); }
        @media (max-width: 768px) { .checkout-container { grid-template-columns: 1fr; } .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <script>document.documentElement.classList.add('loaded');</script>
    <header class="header">
        <nav class="navbar">
            <div class="logo"><a href="index.html"><i class="fas fa-shopping-bag"></i> Metra Market</a></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shopping.html">Products</a></li>
            </ul>
        </nav>
    </header>

    <div class="checkout-page">
        <h1><i class="fas fa-lock"></i> Secure Checkout</h1>
        <div id="checkoutContent"></div>
    </div>

    <script>
        // Product catalog with shipping dimensions
        const products = [
            { id: 1, name: "Wireless Headphones", price: 1199.99, icon: "🎧", weight: 0.35, length: 22, width: 20, height: 10 },
            { id: 2, name: "Smart Watch", price: 2999.99, icon: "⌚", weight: 0.15, length: 12, width: 10, height: 8 },
            { id: 3, name: "Laptop Stand", price: 749.99, icon: "💻", weight: 1.2, length: 28, width: 25, height: 6 },
            { id: 4, name: "Mechanical Keyboard", price: 1949.99, icon: "⌨️", weight: 1.1, length: 44, width: 15, height: 5 },
            { id: 5, name: "Wireless Mouse", price: 899.99, icon: "🖱️", weight: 0.25, length: 13, width: 8, height: 5 },
            { id: 6, name: "USB-C Hub", price: 599.99, icon: "🔌", weight: 0.2, length: 12, width: 6, height: 3 },
            { id: 7, name: "Webcam HD", price: 1299.99, icon: "📷", weight: 0.4, length: 10, width: 8, height: 8 },
            { id: 8, name: "Desk Lamp", price: 449.99, icon: "💡", weight: 0.8, length: 20, width: 15, height: 15 }
        ];

        let cart = [];
        let selectedShipping = { id: null, cost: 0, courierData: null };

        document.addEventListener('DOMContentLoaded', function() {
            loadCart();
        });

        function loadCart() {
            try {
                const data = localStorage.getItem('metraCart');
                if (data) cart = JSON.parse(data);
                if (!Array.isArray(cart) || cart.length === 0) {
                    showEmptyCart();
                    return;
                }
                renderCheckout();
            } catch(e) {
                console.error('Cart error:', e);
                showEmptyCart();
            }
        }

        function showEmptyCart() {
            document.getElementById('checkoutContent').innerHTML = `
                <div class="empty-cart">
                    <i class="fas fa-shopping-cart"></i>
                    <h2>Your cart is empty</h2>
                    <p>Add some products before checking out</p>
                    <a href="shopping.html" style="display:inline-block;margin-top:1rem;padding:0.75rem 1.5rem;background:#DC143C;color:white;text-decoration:none;border-radius:8px;">
                        <i class="fas fa-store"></i> Continue Shopping
                    </a>
                </div>
            `;
        }

        function renderCheckout() {
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            document.getElementById('checkoutContent').innerHTML = `
                <div class="checkout-container">
                    <div class="order-summary">
                        <h3 style="color:var(--light);margin-bottom:1rem;"><i class="fas fa-receipt"></i> Order Summary</h3>
                        <div id="checkoutItemsList">
                            ${cart.map(item => `
                                <div class="checkout-item">
                                    <div class="checkout-item-icon">${item.icon || '📦'}</div>
                                    <div class="checkout-item-details">
                                        <h4>${item.name}</h4>
                                        <p>Qty: ${item.quantity}</p>
                                    </div>
                                    <div class="checkout-item-price">R${(item.price * item.quantity).toFixed(2)}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="checkout-totals">
                            <div class="checkout-total-row"><span>Subtotal:</span><span id="checkoutSubtotal">R${subtotal.toFixed(2)}</span></div>
                            <div class="checkout-total-row"><span>Shipping:</span><span id="checkoutShipping">R0.00</span></div>
                            <div class="checkout-total-row final-total"><span>Total:</span><span id="checkoutTotal">R${subtotal.toFixed(2)}</span></div>
                        </div>
                    </div>
                    <div class="checkout-form">
                        <h3 style="color:var(--light);margin-bottom:1rem;"><i class="fas fa-user"></i> Your Details</h3>
                        <form id="checkoutForm" method="POST">
                            <div class="form-group"><label>Full Name *</label><input type="text" id="checkoutName" required autocomplete="name"></div>
                            <div class="form-group"><label>Email *</label><input type="email" id="checkoutEmail" required autocomplete="email"></div>
                            <div class="form-group"><label>Phone *</label><input type="tel" id="checkoutPhone" required autocomplete="tel"></div>
                            <h3 style="color:var(--light);margin:1.5rem 0 1rem;"><i class="fas fa-map-marker-alt"></i> Delivery Address</h3>
                            <div class="form-group">
                                <label>Street Address *</label>
                                <input type="text" id="checkoutAddress" required placeholder="Start typing to search addresses..." autocomplete="street-address">
                            </div>
                            <div class="form-row">
                                <div class="form-group"><label>City *</label><input type="text" id="checkoutCity" required autocomplete="address-level2"></div>
                                <div class="form-group"><label>Postal Code *</label><input type="text" id="checkoutPostalCode" required maxlength="4" pattern="[0-9]{4}" autocomplete="postal-code"></div>
                            </div>
                            <div class="form-group">
                                <label>Province *</label>
                                <select id="checkoutProvince" required onchange="calculateShipping()">
                                    <option value="">Select Province</option>
                                    <option value="Gauteng">Gauteng</option>
                                    <option value="Western Cape">Western Cape</option>
                                    <option value="KwaZulu-Natal">KwaZulu-Natal</option>
                                    <option value="Eastern Cape">Eastern Cape</option>
                                    <option value="Free State">Free State</option>
                                    <option value="Limpopo">Limpopo</option>
                                    <option value="Mpumalanga">Mpumalanga</option>
                                    <option value="North West">North West</option>
                                    <option value="Northern Cape">Northern Cape</option>
                                </select>
                            </div>
                            <h3 style="color:var(--light);margin:1.5rem 0 1rem;"><i class="fas fa-truck"></i> Shipping</h3>
                            <div id="shippingOptionsContainer">
                                <p style="color:var(--gray);text-align:center;padding:1rem;"><i class="fas fa-map-marker-alt"></i> Select province to see shipping</p>
                            </div>
                            <h3 style="color:var(--light);margin:1.5rem 0 1rem;"><i class="fas fa-credit-card"></i> Payment</h3>
                            <div style="margin-bottom:1.5rem;">
                                <label class="payment-option"><input type="radio" name="payment" value="payfast" checked> <span><i class="fas fa-lock"></i> PayFast (Credit/Debit Card)</span></label>
                                <label class="payment-option"><input type="radio" name="payment" value="eft"> <span><i class="fas fa-university"></i> Bank Transfer (EFT)</span></label>
                            </div>
                            <div class="form-group" style="margin-bottom:1.5rem;">
                                <label style="display:flex;align-items:center;gap:0.5rem;color:var(--gray);cursor:pointer;">
                                    <input type="checkbox" id="checkoutTerms" required style="width:auto;">
                                    I agree to the <a href="terms.html" target="_blank" style="color:#DC143C;">Terms & Conditions</a>
                                </label>
                            </div>
                            <button type="submit" class="checkout-submit-btn" id="submitBtn" aria-label="Complete order and pay securely">
                                <i class="fas fa-lock"></i> Complete Order & Pay
                            </button>
                            <p style="text-align:center;color:var(--gray);font-size:0.85rem;margin-top:1rem;">
                                <i class="fas fa-shield-alt" style="color:#00C853;"></i> Your information is secure and encrypted
                            </p>
                        </form>
                    </div>
                </div>
            `;

            // Fill user data
            try {
                const user = JSON.parse(localStorage.getItem('metraCurrentUser') || '{}');
                if (user.name) document.getElementById('checkoutName').value = user.name;
                if (user.email) document.getElementById('checkoutEmail').value = user.email;
                if (user.phone) document.getElementById('checkoutPhone').value = user.phone;
            } catch(e) {}

            // Initialize address locator after form is rendered
            if (typeof initCheckoutAddressLocator === 'function') {
                setTimeout(() => initCheckoutAddressLocator(), 100);
            }

            // Handle form submit
            document.getElementById('checkoutForm').addEventListener('submit', handleSubmit);
        }

        function getSubtotal() {
            return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        }

        function updateTotals() {
            const subtotal = getSubtotal();
            const total = subtotal + selectedShipping.cost;
            document.getElementById('checkoutSubtotal').textContent = 'R' + subtotal.toFixed(2);
            document.getElementById('checkoutShipping').textContent = 'R' + selectedShipping.cost.toFixed(2);
            document.getElementById('checkoutTotal').textContent = 'R' + total.toFixed(2);
        }

        function calculateShipping() {
            const province = document.getElementById('checkoutProvince').value;
            if (!province) return;

            console.log('Calculating shipping for:', province);
            document.getElementById('shippingOptionsContainer').innerHTML = '<div class="spinner"><i class="fas fa-spinner"></i><p>Calculating shipping...</p></div>';

            // Calculate package dimensions
            let weight = 0, length = 0, width = 0, height = 0;
            cart.forEach(item => {
                const product = products.find(p => p.id === item.id);
                if (product) {
                    weight += (product.weight || 0.5) * item.quantity;
                    length = Math.max(length, product.length || 30);
                    width = Math.max(width, product.width || 20);
                    height += (product.height || 15) * item.quantity;
                }
            });
            if (weight === 0) { weight = 1; length = 30; width = 20; height = 15; }

            // Call Bobgo API via secure serverless proxy with 5 second timeout
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 5000);

            fetch('/api/bobgo-shipping', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    endpoint: 'couriers',
                    origin: '1335 Ingwayuma Street, Senaoane, Soweto, Gauteng, 1818',
                    destination: province,
                    parcels: [{ weight: weight, length: length, width: width, height: height }],
                    currency: 'ZAR',
                    live_rates: true
                }),
                signal: controller.signal
            })
            .then(r => { clearTimeout(timeout); return r.json(); })
            .then(data => {
                if (data.success && data.couriers && data.couriers.length > 0) {
                    showShippingOptions(data.couriers);
                } else {
                    showFallbackRates(province);
                }
            })
            .catch(err => {
                clearTimeout(timeout);
                console.error('Shipping error:', err);
                showFallbackRates(province);
            });
        }

        function showFallbackRates(province) {
            const isGauteng = province === 'Gauteng';
            showShippingOptions([
                { name: 'Standard Delivery', delivery_time: '3-5 business days', price: isGauteng ? 99 : 149 },
                { name: 'Express Delivery', delivery_time: '1-2 business days', price: isGauteng ? 149 : 249 }
            ]);
        }

        function showShippingOptions(couriers) {
            const container = document.getElementById('shippingOptionsContainer');
            const options = couriers.map((c, i) => ({
                id: 'shipping_' + (c.id || i),
                name: c.name || c.courier_name || 'Standard Delivery',
                serviceName: c.service_name || c.service_type || 'Standard Service',
                serviceCode: c.service_code || c.service_type || '',
                time: c.delivery_time || c.transit_time || '2-5 business days',
                price: parseFloat(c.price || c.amount || 0),
                code: c.code || c.provider_slug || '',
                providerSlug: c.provider_slug || c.code || '',
                features: c.features || [],
                trackingIncluded: c.tracking_included !== false,
                insuranceIncluded: c.insurance_included || false,
                serviceCategory: c.service_category || 'standard',
                serviceDescription: c.service_description || c.description || '',
                rawCourier: c
            }));

            container.innerHTML = options.map((o, i) => `
                <div class="shipping-option ${i===0?'selected':''}" onclick="selectShipping('${o.id}', ${o.price}, this)">
                    <input type="radio" name="shipping" ${i===0?'checked':''}>
                    <div class="shipping-option-info">
                        <div class="shipping-option-name">
                            ${o.name}
                            ${o.code ? `<span style="font-size:0.75rem;color:var(--gray);margin-left:0.5rem;">(${o.code})</span>` : ''}
                        </div>
                        <div class="shipping-option-service">
                            ${o.serviceName}
                            ${o.serviceCode ? `<span style="font-size:0.7rem;margin-left:0.3rem;padding:0.1rem 0.4rem;background:rgba(220,20,60,0.2);border-radius:4px;color:#DC143C;">${o.serviceCode}</span>` : ''}
                        </div>
                        ${o.serviceDescription ? `<div style="font-size:0.75rem;color:var(--gray);margin-top:0.2rem;"><i class="fas fa-info-circle" style="font-size:0.65rem;"></i> ${o.serviceDescription}</div>` : ''}
                        <div class="shipping-option-time">
                            <i class="fas fa-clock" style="font-size:0.7rem;"></i> ${o.time}
                            ${o.trackingIncluded ? ' <i class="fas fa-map-marker-alt" style="font-size:0.7rem;margin-left:0.5rem;color:#00C853;" title="Tracking included"></i>' : ''}
                            ${o.insuranceIncluded ? ' <i class="fas fa-shield-alt" style="font-size:0.7rem;margin-left:0.3rem;color:#FFA500;" title="Insurance included"></i>' : ''}
                        </div>
                    </div>
                    <div class="shipping-option-price">
                        <div style="font-size:0.7rem;color:var(--gray);">Service Charge</div>
                        R${o.price.toFixed(2)}
                    </div>
                </div>
            `).join('');

            // Select first option by default with full courier data
            if (options.length > 0) {
                const firstOption = container.querySelector('.shipping-option');
                selectShipping(options[0].id, options[0].price, firstOption, options[0].rawCourier);
            }
        }

        function selectShipping(id, price, element, courierData = null) {
            selectedShipping = { 
                id: id, 
                cost: price, 
                courierData: courierData
            };
            document.querySelectorAll('.shipping-option').forEach(el => el.classList.remove('selected'));
            if (element) element.classList.add('selected');
            updateTotals();
        }

        function handleSubmit(e) {
            e.preventDefault();

            if (!selectedShipping.id) {
                alert('Please select a province to calculate shipping');
                return;
            }

            if (!document.getElementById('checkoutTerms').checked) {
                alert('Please accept the Terms & Conditions');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

            const order = {
                id: 'ORD-' + Date.now(),
                customerName: document.getElementById('checkoutName').value.trim(),
                customerEmail: document.getElementById('checkoutEmail').value.trim(),
                customerPhone: document.getElementById('checkoutPhone').value.trim(),
                shippingAddress: {
                    street: document.getElementById('checkoutAddress').value.trim(),
                    city: document.getElementById('checkoutCity').value.trim(),
                    postalCode: document.getElementById('checkoutPostalCode').value.trim(),
                    province: document.getElementById('checkoutProvince').value,
                    country: 'South Africa'
                },
                shippingMethod: selectedShipping.id,
                shippingCost: selectedShipping.cost,
                items: cart,
                subtotal: getSubtotal(),
                total: getSubtotal() + selectedShipping.cost,
                paymentMethod: document.querySelector('input[name="payment"]:checked').value,
                status: 'pending_payment',
                date: new Date().toLocaleDateString('en-ZA'),
                createdAt: new Date().toISOString()
            };

            // Save order to localStorage
            try {
                const orders = JSON.parse(localStorage.getItem('metraOrders') || '[]');
                orders.push(order);
                localStorage.setItem('metraOrders', JSON.stringify(orders));
                localStorage.removeItem('metraCart');
            } catch(e) { console.error('Order save error:', e); }

            // Track purchase with Google Analytics and Microsoft Clarity
            if (window.metraTracking && window.metraTracking.trackPurchase) {
                window.metraTracking.trackPurchase(order);
            }

            // Create shipment on Bobgo dashboard
            createBobgoShipment(order);

            // Redirect to payment
            if (order.paymentMethod === 'payfast') {
                submitToPayFast(order);
            } else {
                window.location.href = 'success.html?order_id=' + order.id;
            }
        }

        function createBobgoShipment(order) {
            let totalWeight = 0, maxLength = 0, maxWidth = 0, totalHeight = 0, totalValue = 0;
            order.items.forEach(item => {
                totalWeight += (item.weight || 0.5) * (item.quantity || 1);
                maxLength = Math.max(maxLength, item.length || 30);
                maxWidth = Math.max(maxWidth, item.width || 20);
                totalHeight += (item.height || 15) * (item.quantity || 1);
                totalValue += (item.price || 0) * (item.quantity || 1);
            });

            // Extract service code from courier data
            const courierData = selectedShipping.courierData || {};
            const serviceCode = courierData.service_code || courierData.service_type || courierData.service || 'standard';
            const providerSlug = courierData.provider_slug || courierData.code || 'tcg';

            const shipmentData = {
                orderId: order.id,
                orderNumber: order.id,
                invoiceNumber: 'INV-' + Date.now(),
                senderName: 'Metra Market',
                senderPhone: '+27111234567',
                senderEmail: 'support@metramarket.co.za',
                senderAddress: '1335 Ingwayuma Street',
                senderCity: 'Soweto',
                senderProvince: 'Gauteng',
                senderPostalCode: '1818',
                recipientName: order.customerName,
                recipientPhone: order.customerPhone,
                recipientEmail: order.customerEmail,
                recipientAddress: order.shippingAddress.street,
                recipientCity: order.shippingAddress.city,
                recipientProvince: order.shippingAddress.province,
                recipientPostalCode: order.shippingAddress.postalCode,
                parcels: [{
                    weight: totalWeight || 1,
                    length: maxLength || 30,
                    width: maxWidth || 20,
                    height: totalHeight || 15,
                    description: 'E-commerce goods',
                    value: totalValue
                }],
                // Service code mapping for Bobgo API
                provider_slug: providerSlug,
                courierCode: providerSlug,
                courierName: courierData.name || courierData.courier_name || 'The Courier Guy',
                serviceCode: serviceCode,
                service_type: serviceCode,
                serviceType: serviceCode,
                service_level_code: serviceCode,
                serviceName: courierData.service_name || courierData.service_type || '',
                serviceName: courierData.service_name || courierData.service_type || '',
                shippingCost: order.shippingCost || 0,
                insuranceAmount: totalValue,
                instructions: `Order ${order.id} - Metra Market | Status: ${order.status}`,
                reference: order.id,
                metadata: {
                    payment_status: order.status || 'pending_payment',
                    order_status: order.status || 'pending_payment',
                    customer_email: order.customerEmail,
                    customer_phone: order.customerPhone,
                    service_code: serviceCode,
                    provider_slug: providerSlug
                }
            };

            fetch('/api/bobgo-create-shipment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(shipmentData)
            })
            .then(r => r.json())
            .then(data => {
                console.log('Bobgo shipment response:', data);
                if (data.shipmentCreated && data.shipment) {
                    order.bobgoShipment = data.shipment;
                    order.bobgoTrackingNumber = data.shipment.tracking_number || '';
                    order.bobgoShipmentId = data.shipment.id || '';
                    order.shipmentStatus = data.shipment.status || 'created';
                    try {
                        const orders = JSON.parse(localStorage.getItem('metraOrders') || '[]');
                        const idx = orders.findIndex(o => o.id === order.id);
                        if (idx !== -1) { orders[idx] = order; localStorage.setItem('metraOrders', JSON.stringify(orders)); }
                    } catch(e) { console.error('Order update error:', e); }
                    console.log('✅ Shipment created on Bobgo dashboard:', data.shipment);
                } else {
                    console.warn('⚠️ Bobgo shipment creation failed:', data);
                    if (window.bobgoSyncQueue) window.bobgoSyncQueue.addToQueue(shipmentData);
                }
            })
            .catch(err => {
                console.error('❌ Bobgo shipment creation error:', err);
                if (window.bobgoSyncQueue) window.bobgoSyncQueue.addToQueue(shipmentData);
            });
        }

        function submitToPayFast(order) {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = 'https://www.payfast.co.za/eng/process';
            form.style.display = 'none';

            const fields = {
                merchant_id: '13343379',
                merchant_key: '8jgcm78j7sqph',
                amount: order.total.toFixed(2),
                item_name: 'Order ' + order.id,
                item_description: 'Metra Market Purchase',
                return_url: window.location.origin + '/success.html?order_id=' + order.id,
                cancel_url: window.location.origin + '/cancel.html?order_id=' + order.id,
                notify_url: window.location.origin + '/ipn.php',
                email_address: order.customerEmail,
                name_first: order.customerName.split(' ')[0] || 'Customer',
                name_last: order.customerName.split(' ').slice(1).join(' ') || ''
            };

            Object.keys(fields).forEach(key => {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = fields[key];
                form.appendChild(input);
            });

            document.body.appendChild(form);
            form.submit();
        }
    </script>
