<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Metra Market</title>
    <link rel="stylesheet" href="styles.css?v=5.0.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .checkout-page { min-height: 100vh; padding: 6rem 2rem 2rem; max-width: 1200px; margin: 0 auto; }
        .checkout-page h1 { font-size: 2rem; margin-bottom: 2rem; text-align: center; }
        .checkout-container { display: grid; grid-template-columns: 1fr 1.2fr; gap: 2rem; }
        .order-summary { background: rgba(255, 248, 231, 0.05); border: 1px solid rgba(255, 248, 231, 0.1); border-radius: 12px; padding: 1.5rem; }
        .checkout-item { display: flex; align-items: center; gap: 1rem; padding: 0.75rem; background: rgba(0, 0, 0, 0.2); border-radius: 8px; margin-bottom: 0.75rem; }
        .checkout-item-icon { font-size: 2rem; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #8B0000, #DC143C); border-radius: 8px; }
        .checkout-item-details h4 { color: var(--light); font-size: 0.95rem; margin-bottom: 0.25rem; }
        .checkout-item-details p { color: var(--gray); font-size: 0.85rem; }
        .checkout-item-price { margin-left: auto; color: var(--primary); font-weight: 700; }
        .checkout-totals { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(255, 248, 231, 0.1); }
        .checkout-total-row { display: flex; justify-content: space-between; padding: 0.5rem 0; color: var(--gray); }
        .checkout-total-row.final-total { color: var(--light); font-size: 1.25rem; font-weight: 700; border-top: 2px solid var(--primary); padding-top: 0.75rem; margin-top: 0.5rem; }
        .checkout-form { background: rgba(255, 248, 231, 0.03); border: 1px solid rgba(255, 248, 231, 0.1); border-radius: 12px; padding: 2rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; color: var(--light); margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 0.75rem; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 248, 231, 0.2); border-radius: 8px; color: var(--light); font-size: 0.9rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .shipping-option, .payment-option { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; background: rgba(255, 248, 231, 0.05); border-radius: 8px; cursor: pointer; border: 1px solid transparent; transition: all 0.3s; margin-bottom: 0.5rem; }
        .shipping-option.selected { border-color: var(--primary); background: rgba(139, 0, 0, 0.1); }
        .shipping-option input, .payment-option input { width: auto; accent-color: #00C853; }
        .shipping-option-info { flex: 1; }
        .shipping-option-name { color: var(--light); font-weight: 600; font-size: 0.95rem; }
        .shipping-option-time { color: var(--gray); font-size: 0.8rem; }
        .shipping-option-price { color: #00C853; font-weight: 700; font-size: 1.1rem; }
        .checkout-submit-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, #8B0000, #DC143C); border: none; border-radius: 12px; color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 1.5rem; }
        .checkout-submit-btn:hover { transform: translateY(-2px); }
        .checkout-loading { text-align: center; color: var(--gray); padding: 2rem; }
        .checkout-loading i { animation: spin 1s linear infinite; font-size: 2rem; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @media (max-width: 768px) { .checkout-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <script>document.documentElement.classList.add('loaded');</script>
    <header class="header">
        <nav class="navbar">
            <div class="logo"><a href="index.html"><i class="fas fa-shopping-bag"></i> Metra Market</a></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shopping.html">Products</a></li>
            </ul>
        </nav>
    </header>

    <div class="checkout-page">
        <h1><i class="fas fa-lock"></i> Secure Checkout</h1>
        <div id="checkoutLoading" class="checkout-loading">
            <i class="fas fa-spinner"></i>
            <p>Loading checkout...</p>
        </div>
        <div class="checkout-container" id="checkoutContainer" style="display:none;">
            <div class="order-summary">
                <h3><i class="fas fa-receipt"></i> Order Summary</h3>
                <div id="checkoutItemsList"></div>
                <div class="checkout-totals">
                    <div class="checkout-total-row"><span>Subtotal:</span><span id="checkoutSubtotal">R0.00</span></div>
                    <div class="checkout-total-row"><span>Shipping:</span><span id="checkoutShipping">R0.00</span></div>
                    <div class="checkout-total-row final-total"><span>Total:</span><span id="checkoutTotal">R0.00</span></div>
                </div>
            </div>
            <div class="checkout-form">
                <h3><i class="fas fa-user"></i> Your Details</h3>
                <form id="checkoutForm">
                    <div class="form-group"><label>Full Name</label><input type="text" id="checkoutName" required></div>
                    <div class="form-group"><label>Email</label><input type="email" id="checkoutEmail" required></div>
                    <div class="form-group"><label>Phone</label><input type="tel" id="checkoutPhone" required></div>
                    <h3><i class="fas fa-map-marker-alt"></i> Delivery Address</h3>
                    <div class="form-group"><label>Street Address</label><input type="text" id="checkoutAddress" required></div>
                    <div class="form-row">
                        <div class="form-group"><label>City</label><input type="text" id="checkoutCity" required></div>
                        <div class="form-group"><label>Postal Code</label><input type="text" id="checkoutPostalCode" required></div>
                    </div>
                    <div class="form-group">
                        <label>Province</label>
                        <select id="checkoutProvince" required onchange="window.calculateShipping()">
                            <option value="">Select Province</option>
                            <option value="Gauteng">Gauteng</option>
                            <option value="Western Cape">Western Cape</option>
                            <option value="KwaZulu-Natal">KwaZulu-Natal</option>
                            <option value="Eastern Cape">Eastern Cape</option>
                            <option value="Free State">Free State</option>
                            <option value="Limpopo">Limpopo</option>
                            <option value="Mpumalanga">Mpumalanga</option>
                            <option value="North West">North West</option>
                            <option value="Northern Cape">Northern Cape</option>
                        </select>
                    </div>
                    <h3><i class="fas fa-truck"></i> Shipping</h3>
                    <div id="shippingOptionsContainer">
                        <p style="color:var(--gray);text-align:center;padding:1rem;">Select province to see shipping</p>
                    </div>
                    <h3><i class="fas fa-credit-card"></i> Payment</h3>
                    <div class="payment-options">
                        <label class="payment-option"><input type="radio" name="payment" value="payfast" checked> PayFast (Card)</label>
                        <label class="payment-option"><input type="radio" name="payment" value="eft"> Bank Transfer</label>
                    </div>
                    <div class="form-group"><label><input type="checkbox" id="checkoutTerms" required> I agree to Terms & Conditions</label></div>
                    <button type="submit" class="checkout-submit-btn"><i class="fas fa-lock"></i> Complete Order</button>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js?v=5.0.0"></script>
    <script>
        // Cart and checkout state
        let cart = [];
        let selectedShipping = { id: null, cost: 0 };
        let products = [];

        // Load checkout
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Checkout loading...');
            loadCart();
            loadProducts();
        });

        function loadCart() {
            try {
                const data = localStorage.getItem('metraCart');
                if (data) {
                    cart = JSON.parse(data);
                    if (!Array.isArray(cart) || cart.length === 0) {
                        window.location.href = 'shopping.html';
                        return;
                    }
                }
            } catch(e) {
                console.error('Cart error:', e);
                cart = [];
            }
        }

        function loadProducts() {
            const checkProducts = setInterval(() => {
                if (typeof window.products !== 'undefined') {
                    clearInterval(checkProducts);
                    products = window.products;
                    renderCheckout();
                }
            }, 100);
            setTimeout(() => { clearInterval(checkProducts); renderCheckout(); }, 5000);
        }

        function renderCheckout() {
            document.getElementById('checkoutLoading').style.display = 'none';
            document.getElementById('checkoutContainer').style.display = 'grid';

            // Render cart items
            const itemsHtml = cart.map(item => `
                <div class="checkout-item">
                    <div class="checkout-item-icon">${item.icon || '📦'}</div>
                    <div class="checkout-item-details">
                        <h4>${item.name}</h4>
                        <p>Qty: ${item.quantity}</p>
                    </div>
                    <div class="checkout-item-price">R${(item.price * item.quantity).toFixed(2)}</div>
                </div>
            `).join('');
            document.getElementById('checkoutItemsList').innerHTML = itemsHtml;

            // Update totals
            updateTotals();

            // Fill user data
            try {
                const user = JSON.parse(localStorage.getItem('metraCurrentUser') || '{}');
                if (user.name) document.getElementById('checkoutName').value = user.name;
                if (user.email) document.getElementById('checkoutEmail').value = user.email;
                if (user.phone) document.getElementById('checkoutPhone').value = user.phone;
            } catch(e) {}
        }

        function getSubtotal() {
            return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        }

        function updateTotals() {
            const subtotal = getSubtotal();
            const total = subtotal + selectedShipping.cost;
            document.getElementById('checkoutSubtotal').textContent = 'R' + subtotal.toFixed(2);
            document.getElementById('checkoutShipping').textContent = 'R' + selectedShipping.cost.toFixed(2);
            document.getElementById('checkoutTotal').textContent = 'R' + total.toFixed(2);
        }

        function calculateShipping() {
            const province = document.getElementById('checkoutProvince').value;
            if (!province) return;

            console.log('Calculating shipping for:', province);
            document.getElementById('shippingOptionsContainer').innerHTML = '<div class="checkout-loading"><i class="fas fa-spinner"></i></div>';

            // Calculate dimensions
            let weight = 0, length = 0, width = 0, height = 0;
            cart.forEach(item => {
                const product = products.find(p => p.id === item.id);
                if (product) {
                    weight += (product.weight || 0.5) * item.quantity;
                    length = Math.max(length, product.length || 30);
                    width = Math.max(width, product.width || 20);
                    height += (product.height || 15) * item.quantity;
                }
            });
            if (weight === 0) { weight = 0.5; length = 30; width = 20; height = 15; }

            // Call Bobgo API
            fetch('https://api.bobgo.co.za/v1/couriers', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer 5a830068eeb9431da5bf1577a9980d99',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    origin: 'Johannesburg',
                    destination: province,
                    parcels: [{ weight: weight, length: length, width: width, height: height }],
                    currency: 'ZAR',
                    live_rates: true
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.couriers && data.couriers.length > 0) {
                    showShippingOptions(data.couriers);
                } else {
                    showFallbackRates(province);
                }
            })
            .catch(err => {
                console.error('Bobgo error:', err);
                showFallbackRates(province);
            });
        }

        function showFallbackRates(province) {
            const isGauteng = province === 'Gauteng';
            const options = [
                { id: 'standard', name: 'Standard Delivery', time: '3-5 days', price: isGauteng ? 99 : 149 },
                { id: 'express', name: 'Express Delivery', time: '1-2 days', price: isGauteng ? 149 : 249 }
            ];
            showShippingOptions(options);
        }

        function showShippingOptions(couriers) {
            const container = document.getElementById('shippingOptionsContainer');
            const options = couriers.map((c, i) => ({
                id: 'courier_' + i,
                name: c.name || c.courier_name || 'Standard',
                time: c.delivery_time || '2-5 days',
                price: parseFloat(c.price || c.amount || 0)
            }));

            container.innerHTML = options.map((o, i) => `
                <div class="shipping-option ${i===0?'selected':''}" onclick="window.selectShipping('${o.id}', ${o.price}, this)">
                    <input type="radio" name="shipping" ${i===0?'checked':''}>
                    <div class="shipping-option-info">
                        <div class="shipping-option-name">${o.name}</div>
                        <div class="shipping-option-time">${o.time}</div>
                    </div>
                    <div class="shipping-option-price">R${o.price.toFixed(2)}</div>
                </div>
            `).join('');

            // Auto-select first
            window.selectShipping(options[0].id, options[0].price, container.querySelector('.shipping-option'));
        }

        function selectShipping(id, price, element) {
            selectedShipping = { id: id, cost: price };
            document.querySelectorAll('.shipping-option').forEach(el => el.classList.remove('selected'));
            if (element) element.classList.add('selected');
            updateTotals();
            console.log('Shipping selected:', id, 'R' + price);
        }

        // Handle form submission
        document.getElementById('checkoutForm').addEventListener('submit', function(e) {
            e.preventDefault();

            if (!selectedShipping.id) {
                alert('Please select province and shipping method');
                return;
            }

            if (!document.getElementById('checkoutTerms').checked) {
                alert('Please accept Terms & Conditions');
                return;
            }

            const order = {
                id: 'ORD-' + Date.now(),
                customerName: document.getElementById('checkoutName').value,
                customerEmail: document.getElementById('checkoutEmail').value,
                customerPhone: document.getElementById('checkoutPhone').value,
                shippingAddress: {
                    street: document.getElementById('checkoutAddress').value,
                    city: document.getElementById('checkoutCity').value,
                    postalCode: document.getElementById('checkoutPostalCode').value,
                    province: document.getElementById('checkoutProvince').value,
                    country: 'South Africa'
                },
                shippingMethod: selectedShipping.id,
                shippingCost: selectedShipping.cost,
                items: cart,
                subtotal: getSubtotal(),
                total: getSubtotal() + selectedShipping.cost,
                paymentMethod: document.querySelector('input[name="payment"]:checked').value,
                status: 'pending_payment',
                date: new Date().toLocaleDateString('en-ZA'),
                createdAt: new Date().toISOString()
            };

            // Save order
            try {
                const orders = JSON.parse(localStorage.getItem('metraOrders') || '[]');
                orders.push(order);
                localStorage.setItem('metraOrders', JSON.stringify(orders));
                localStorage.removeItem('metraCart');
            } catch(e) {
                console.error('Order save error:', e);
            }

            // Redirect to PayFast or success
            if (order.paymentMethod === 'payfast') {
                submitToPayFast(order);
            } else {
                window.location.href = 'success.html?order_id=' + order.id;
            }
        });

        function submitToPayFast(order) {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = 'https://www.payfast.co.za/eng/process';
            form.style.display = 'none';

            const fields = {
                merchant_id: '13343379',
                merchant_key: '8jgcm78j7sqph',
                amount: order.total.toFixed(2),
                item_name: 'Order ' + order.id,
                item_description: 'Metra Market Purchase',
                return_url: window.location.origin + '/success.html?order_id=' + order.id,
                cancel_url: window.location.origin + '/cancel.html?order_id=' + order.id,
                notify_url: window.location.origin + '/ipn.php',
                email_address: order.customerEmail,
                name_first: order.customerName.split(' ')[0],
                name_last: order.customerName.split(' ').slice(1).join(' ')
            };

            Object.keys(fields).forEach(key => {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = fields[key];
                form.appendChild(input);
            });

            document.body.appendChild(form);
            form.submit();
        }

        // Make functions global
        window.calculateShipping = calculateShipping;
        window.selectShipping = selectShipping;
    </script>
</body>
</html>
