<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful | Metra Market</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .success-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--dark) 0%, var(--primary-dark) 100%);
            padding: 2rem;
            text-align: center;
        }
        .success-container {
            background: rgba(255, 248, 231, 0.05);
            border: 1px solid rgba(255, 248, 231, 0.1);
            border-radius: 20px;
            padding: 3rem;
            max-width: 500px;
            animation: slideIn 0.5s ease-out;
        }
        .success-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, #228B22, #32CD32);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            animation: bounce 0.6s ease-out;
        }
        .success-title {
            font-size: 2rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #228B22, #32CD32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .success-message {
            color: var(--gray);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .order-details {
            background: rgba(255, 248, 231, 0.05);
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-align: left;
        }
        .order-detail-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 248, 231, 0.05);
        }
        .order-detail-row:last-child {
            border-bottom: none;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--secondary);
        }
        .success-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @media (max-width: 480px) {
            .success-container {
                padding: 2rem 1.5rem;
            }
            .success-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="success-page">
        <div class="success-container">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            <h1 class="success-title">Payment Successful!</h1>
            <p class="success-message">
                Thank you for your purchase. Your payment has been processed successfully.
                You will receive a confirmation email shortly.
            </p>
            
            <div class="order-details" id="orderDetails">
                <div class="order-detail-row">
                    <span>Order ID:</span>
                    <span id="orderId">Loading...</span>
                </div>
                <div class="order-detail-row">
                    <span>Date:</span>
                    <span id="orderDate">Loading...</span>
                </div>
                <div class="order-detail-row">
                    <span>Amount Paid:</span>
                    <span id="orderAmount">Loading...</span>
                </div>
            </div>

            <div class="success-actions">
                <a href="index.html" class="cta-btn">
                    <i class="fas fa-store"></i> Continue Shopping
                </a>
                <button class="btn-secondary" onclick="window.print()">
                    <i class="fas fa-print"></i> Print Receipt
                </button>
            </div>
        </div>
    </div>

    <script>
        // Get order details from URL parameters or localStorage
        function loadOrderDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('order_id') || localStorage.getItem('lastOrderId');

            if (orderId) {
                localStorage.setItem('lastOrderId', orderId);
                document.getElementById('orderId').textContent = orderId;

                // Try to get full order details from localStorage
                let orders = [];
                try {
                    orders = JSON.parse(localStorage.getItem('metraOrders') || '[]');
                } catch (e) {
                    console.error('Failed to parse orders:', e);
                    orders = [];
                }
                
                // Fix type mismatch: orderId from URL is string, order.id might be number
                const order = orders.find(o => String(o.id) === String(orderId));

                if (order) {
                    document.getElementById('orderDate').textContent = order.date || new Date().toLocaleDateString('en-ZA');
                    const total = parseFloat(order.total) || 0;
                    document.getElementById('orderAmount').textContent = 'R' + total.toFixed(2);

                    // Update order status to paid
                    order.paymentStatus = 'paid';
                    order.status = 'processing';
                    try {
                        localStorage.setItem('metraOrders', JSON.stringify(orders));
                    } catch (e) {
                        console.error('Failed to save order:', e);
                    }
                } else {
                    console.warn('Order not found in localStorage:', orderId);
                    document.getElementById('orderDate').textContent = new Date().toLocaleDateString('en-ZA');
                    document.getElementById('orderAmount').textContent = 'Pending';
                }
            } else {
                document.getElementById('orderId').textContent = 'N/A';
                document.getElementById('orderDate').textContent = new Date().toLocaleDateString('en-ZA');
                document.getElementById('orderAmount').textContent = 'Pending';
            }
        }

        // Clear cart on successful payment
        try {
            localStorage.removeItem('metraCart');
        } catch (e) {
            console.error('Failed to clear cart:', e);
        }

        loadOrderDetails();
    </script>
</body>
</html>
